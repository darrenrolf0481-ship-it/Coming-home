<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spectral Nexus AI - Obsidian Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050208;
            overflow: hidden;
            color: #cffafe;
            font-family: 'JetBrains Mono', monospace;
        }

        #root {
            height: 100vh;
            width: 100vw;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-2%, 2%) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes ethereal-drift {
            0% { transform: translate(0, 0) scale(1); opacity: 0.15; }
            50% { transform: translate(-3%, 3%) scale(1.1); opacity: 0.3; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.15; }
        }

        @keyframes pulse-cyan {
            0%, 100% { opacity: 0.3; box-shadow: 0 0 10px rgba(0, 255, 255, 0.1); }
            50% { opacity: 0.7; box-shadow: 0 0 30px rgba(0, 255, 255, 0.4); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #00ffff, -0.025em -0.05em 0 #ff0055, 0.025em 0.05em 0 #00ffff; }
            14% { text-shadow: 0.05em 0 0 #00ffff, -0.025em -0.05em 0 #ff0055, 0.025em 0.05em 0 #00ffff; }
            15% { text-shadow: -0.05em -0.025em 0 #00ffff, 0.025em 0.025em 0 #ff0055, -0.05em -0.05em 0 #00ffff; }
            49% { text-shadow: -0.05em -0.025em 0 #00ffff, 0.025em 0.025em 0 #ff0055, -0.05em -0.05em 0 #00ffff; }
            50% { text-shadow: 0.025em 0.05em 0 #00ffff, 0.05em 0 0 #ff0055, 0 -0.05em 0 #00ffff; }
            99% { text-shadow: 0.025em 0.05em 0 #00ffff, 0.05em 0 0 #ff0055, 0 -0.05em 0 #00ffff; }
            100% { text-shadow: -0.025em 0 0 #00ffff, -0.025em -0.025em 0 #ff0055, -0.025em -0.05em 0 #00ffff; }
        }

        .animate-drift { animation: drift 25s ease-in-out infinite; }
        .animate-ethereal { animation: ethereal-drift 15s ease-in-out infinite; }
        .animate-pulse-cyan { animation: pulse-cyan 4s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 40s linear infinite; }
        .animate-spin-reverse { animation: spin-reverse 25s linear infinite; }
        .glitch { animation: glitch 3s infinite; }
        
        .obsidian-text { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 0.4em; }
        .data-text { font-family: 'JetBrains Mono', monospace; font-weight: 300; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.3); border-radius: 4px; }

        .glass-panel {
            background: rgba(8, 4, 15, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.08);
            box-shadow: inset 0 0 30px rgba(0, 255, 255, 0.03);
            position: relative;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 4px;
            border-top: 1px solid rgba(0, 255, 255, 0.4);
            border-left: 1px solid rgba(0, 255, 255, 0.4);
        }

        .glass-panel::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0; width: 4px; height: 4px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.4);
            border-right: 1px solid rgba(0, 255, 255, 0.4);
        }

        .hex-bg {
            background-image: 
                linear-gradient(30deg, #0a0510 12%, transparent 12.5%, transparent 87%, #0a0510 87.5%, #0a0510),
                linear-gradient(150deg, #0a0510 12%, transparent 12.5%, transparent 87%, #0a0510 87.5%, #0a0510),
                linear-gradient(30deg, #0a0510 12%, transparent 12.5%, transparent 87%, #0a0510 87.5%, #0a0510),
                linear-gradient(150deg, #0a0510 12%, transparent 12.5%, transparent 87%, #0a0510 87.5%, #0a0510),
                linear-gradient(60deg, #0f081d 25%, transparent 25.5%, transparent 75%, #0f081d 75%, #0f081d),
                linear-gradient(60deg, #0f081d 25%, transparent 25.5%, transparent 75%, #0f081d 75%, #0f081d);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
        }

        .scanline-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 60;
        }

        .scanline-bar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 61;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

</html>
